<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منيو النون</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #1e2f8d;
      --yellow: #f5a623;
      --white: #ffffff;
      --light-bg: #f9f9f9;
      --text-dark: #1a1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #eef0f8, #f7f8ff);
      color: var(--text-dark);
      direction: rtl;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .page {
      position: relative;
      max-width: 480px;
      margin: 40px auto;
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 50px rgba(0,0,0,0.15);
    }

    /* Floating Icons */
    .floating-icons {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .floating-icons span {
      position: absolute;
      font-size: 22px;
      opacity: 0.12;
      animation: floatIcons 12s ease-in-out infinite;
    }

    .floating-icons span:nth-child(1) { top: 10%; left: 15%; }
    .floating-icons span:nth-child(2) { top: 40%; right: 10%; }
    .floating-icons span:nth-child(3) { bottom: 20%; left: 20%; }
    .floating-icons span:nth-child(4) { bottom: 10%; right: 15%; }

    @keyframes floatIcons {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .header {
      text-align: center;
      padding: 28px 20px 10px;
    }

    .header img {
      width: 160px;
      filter: drop-shadow(0 8px 18px rgba(30,47,141,0.25));
      animation: floatLogo 3s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .menu-badge {
      background: linear-gradient(135deg, #1e2f8d, #3a4bd1);
      color: white;
      display: inline-block;
      padding: 10px 36px;
      border-radius: 50px;
      font-size: 1.3rem;
      font-weight: 700;
      margin: 14px auto 4px;
      box-shadow: 0 6px 18px rgba(30,47,141,0.3);
      transition: 0.3s;
    }

    .menu-badge:hover { transform: scale(1.05); }

    .menu-section { padding: 0 20px 20px; }

    .section-title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--blue);
      margin: 22px 0 14px;
      animation: fadeSlide 0.8s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-title::after {
      content: '';
      display: block;
      width: 50px;
      height: 3px;
      background: var(--yellow);
      margin: 5px auto 0;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--light-bg);
      border-radius: 12px;
      border-right: 4px solid var(--yellow);
      transition: all 0.25s ease;
    }

    .menu-item:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 8px 22px rgba(30,47,141,0.18);
      background: #f0f3ff;
    }

    .item-name { font-weight: 700; }

    .item-price {
      font-weight: 900;
      color: var(--blue);
      background: #e0e4f7;
      border-radius: 20px;
      padding: 2px 10px;
    }

    .divider {
      width: 80%;
      height: 2px;
      background: linear-gradient(to left, transparent, var(--yellow), transparent);
      margin: 10px auto;
    }

    .footer {
      background: var(--blue);
      color: white;
      text-align: center;
      padding: 14px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<div class="page">

  <div class="floating-icons">
    <span>☕</span>
    <span>🍪</span>
    <span>🍫</span>
    <span>🫖</span>
  </div>

  <div class="header">
    <img src="لوجو-النون.png" alt="لوجو" />
    <div class="menu-badge">☕ منيو النون</div>
  </div>

  <div class="menu-section">
    <div class="section-title">مشروبات</div>
    <div class="menu-grid">
      <div class="menu-item"><span>نسكافيه</span><span class="item-price">3 ₪</span></div>
      <div class="menu-item"><span>قهوة</span><span class="item-price">4 ₪</span></div>
      <div class="menu-item"><span>شاي</span><span class="item-price">3 ₪</span></div>
      <div class="menu-item"><span>كابتشينو</span><span class="item-price">3 ₪</span></div>
      <div class="menu-item"><span>مياه</span><span class="item-price">2 ₪</span></div>
      <div class="menu-item"><span>زهورات</span><span class="item-price">3 ₪</span></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="menu-section">
    <div class="section-title">سناكس</div>
    <div class="menu-grid">
      <div class="menu-item"><span>بسكوت</span><span class="item-price">4 ₪</span></div>
      <div class="menu-item"><span>لفيفا</span><span class="item-price">3 ₪</span></div>
      <div class="menu-item"><span>هوهوز</span><span class="item-price">1 ₪</span></div>
      <div class="menu-item"><span>شوكولاتة</span><span class="item-price">1 ₪</span></div>
    </div>
  </div>

  <div class="footer">النون — لكل لحظة طعم</div>

</div>

</body>
</html>
