<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منيو النون</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #1e2f8d;
      --yellow: #f5a623;
      --white: #ffffff;
      --light-bg: #f9f9f9;
      --text-dark: #1a1a1a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background-color: #eef0f8;
      color: var(--text-dark);
      direction: rtl;
    }
    .page {
      max-width: 480px;
      margin: 40px auto;
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    }
    .header {
      background: var(--white);
      text-align: center;
      padding: 28px 20px 10px;
    }
    .header img {
      width: 160px;
      object-fit: contain;
    }
    .menu-badge {
      background: var(--blue);
      color: var(--white);
      display: inline-block;
      padding: 10px 36px;
      border-radius: 50px;
      font-size: 1.3rem;
      font-weight: 700;
      margin: 14px auto 4px;
    }
    .menu-section { padding: 0 20px 20px; }
    .section-title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--blue);
      margin: 22px 0 14px;
    }
    .section-title::after {
      content: '';
      display: block;
      width: 50px;
      height: 3px;
      background: var(--yellow);
      margin: 5px auto 0;
      border-radius: 2px;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--light-bg);
      border-radius: 12px;
      border-right: 4px solid var(--yellow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .menu-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(30,47,141,0.12);
    }
    .item-name {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text-dark);
    }
    .item-price {
      font-size: 0.88rem;
      font-weight: 900;
      color: var(--blue);
      background: #e0e4f7;
      border-radius: 20px;
      padding: 2px 10px;
      white-space: nowrap;
    }
    .divider {
      width: 80%;
      height: 2px;
      background: linear-gradient(to left, transparent, var(--yellow), transparent);
      margin: 0 auto;
      border: none;
    }
    .footer {
      background: var(--blue);
      color: var(--white);
      text-align: center;
      padding: 14px;
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <img src="لوجو-النون.png" alt="لوجو النون" />
    <br/>
    <div class="menu-badge">&#9749; منيو النون</div>
  </div>

  <div class="menu-section">
    <div class="section-title">مشروبات</div>
    <div class="menu-grid">
      <div class="menu-item"><span class="item-name">نسكافيه</span><span class="item-price">3 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">قهوة</span><span class="item-price">4 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">شاي</span><span class="item-price">3 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">كابتشينو</span><span class="item-price">3 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">مياه معدنية</span><span class="item-price">2 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">زهورات</span><span class="item-price">3 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">بلو</span><span class="item-price">4 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">تسخين مياه</span><span class="item-price">1 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">مراعي</span><span class="item-price">3 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">كاسة اندومي</span><span class="item-price">5 &#8362;</span></div>
    </div>
  </div>

  <hr class="divider" />

  <div class="menu-section">
    <div class="section-title">سناكس</div>
    <div class="menu-grid">
      <div class="menu-item"><span class="item-name">بسكوت فيب</span><span class="item-price">4 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">لفيفا</span><span class="item-price">3 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">هوهوز</span><span class="item-price">1 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">بسكوت BITE</span><span class="item-price">2 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">نمبر ون</span><span class="item-price">2 &#8362;</span></div>
      <div class="menu-item"><span class="item-name">شوكولاتة</span><span class="item-price">1 &#8362;</span></div>
    </div>
  </div>

  <div class="footer">النون — لكل لحظة طعم</div>

</div>
</body>
</html>
